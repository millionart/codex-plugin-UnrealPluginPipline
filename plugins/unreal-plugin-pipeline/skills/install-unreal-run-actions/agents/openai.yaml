interface:
  display_name: "Install Run Actions"
  short_description: "Run the guarded installer script"
  icon_small: "./assets/unreal-plugin-pipeline-small.svg"
  icon_large: "./assets/unreal-plugin-pipeline.svg"
  default_prompt: "Use $install-unreal-run-actions to install Unreal Plugin Pipeline actions by running scripts/install-run-actions.ps1 from the current workspace. Do not search recursively for .uplugin files and do not choose the first plugin found. Pass -PluginName only if the user explicitly named a plugin. Do not edit files manually. Do not use git restore, git checkout, or any manual recovery. If the script fails, report its output and stop."
